name: Frontend Admin Deploy

on:
  push:
    branches: [ master ]
    paths:
      - 'ruoyi-ui/**'
      - '.github/workflows/frontend-admin-deploy.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '16'

      - name: Install & Build
        run: |
          cd ruoyi-ui
          npm install
          npm run build:prod

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p 3322 ${{ secrets.FRONTEND_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to Frontend Server
        run: |
          # 上传新版本（dist/. 表示上传内容，不创建 dist 子目录）
          scp -i ~/.ssh/id_ed25519 -P 3322 -r \
            ruoyi-ui/dist/. \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.FRONTEND_HOST }}:${{ secrets.FRONTEND_ADMIN_PATH }}/

          # 重载 OpenResty（1Panel 的 OpenResty 跑在 Docker 容器里）
          ssh -i ~/.ssh/id_ed25519 -p 3322 \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.FRONTEND_HOST }} \
            "docker exec \$(docker ps --filter 'name=openresty' --format '{{.Names}}' | head -1) nginx -s reload && echo '管理后台部署成功'"

      - name: Cleanup SSH
        if: always()
        run: rm -f ~/.ssh/id_ed25519
