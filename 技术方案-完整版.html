const md = '# 港好住信息系统平台技术服务方案\n\n---\n\n## 目录\n\n- [第一部分：对项目的认识和需求分析](#第一部分对项目的认识和需求分析)\n  - [1.1 项目建设背景](#11-项目建设背景)\n  - [1.2 项目建设内容](#12-项目建设内容)\n  - [1.3 项目建设重点难点](#13-项目建设重点难点)\n  - [1.4 项目业务需求](#14-项目业务需求)\n  - [1.5 应用功能需求](#15-应用功能需求)\n\n- [第二部分：应用系统功能设计](#第二部分应用系统功能设计)\n  - [2.1 移动端功能模块](#21-移动端功能模块)\n  - [2.2 后台管理功能模块](#22-后台管理功能模块)\n\n- [第三部分：系统业务流程设计](#第三部分系统业务流程设计)\n\n- [第四部分：技术架构设计](#第四部分技术架构设计)\n  - [4.1 系统总体架构](#41-系统总体架构)\n  - [4.2 技术选型](#42-技术选型)\n  - [4.3 数据库设计](#43-数据库设计)\n  - [4.4 接口设计](#44-接口设计)\n  - [4.5 安全设计](#45-安全设计)\n  - [4.6 部署方案](#46-部署方案)\n\n---\n\n## 第一部分：对项目的认识和需求分析\n\n### 1.1 项目建设背景\n\n#### 1.1.1 港区保障性住房管理现状\n\n郑州航空港经济综合实验区（以下简称"港区"）作为国家级航空经济先行区，近年来快速发展，吸引了大量人才和企业入驻。为解决人才住房问题，港区推出了保租房、人才公寓等保障性住房政策，目前管理现状呈现以下特点：\n\n1. **管理房源类型多样化**\n   - 人才公寓：面向高层次人才的保障性住房\n   - 保租房：面向符合条件的新市民、青年人的保障性租赁住房\n   - 市场租赁房源：面向市场的普通租赁房源\n\n2. **管理流程复杂化**\n   - 资格校验涉及多部门数据（社保、婚姻、学历、住房信息等）\n   - 租赁全流程管理（选房、签约、入住、退租、续租、缴费等）\n   - 企业客户集中租赁服务\n\n3. **信息化程度不足**\n   - 现有系统（郑好住）功能不够完善\n   - 缺乏统一的移动端服务平台\n   - 数据分散，管理效率有待提升\n\n#### 1.1.2 人才引进政策背景\n\n为响应国家"房住不炒"定位和加快发展保障性租赁住房的要求，港区出台多项人才引进和住房保障政策：\n\n1. **人才引进政策**\n   - 高���次人才购房补贴政策\n   - 人才公寓租金优惠\n   - 购房契税补贴\n\n2. **保障性住房政策**\n   - 保租房租金低于市场价\n   - 租赁期限灵活\n   - 租购同权保障\n\n#### 1.1.3 信息化建设必要性\n\n1. **提升管理效率**\n   - 自动化资格校验，减少人工审核工作量\n   - 在线签约、缴费，简化业务流程\n   - 数据统计分析，辅助决策\n\n2. **改善用户体验**\n   - 统一的移动端服务平台\n   - 7×24小时在线服务\n   - 业务进度实时查询\n\n3. **数据整合共享**\n   - 打破数据孤岛\n   - 与郑好办等政务系统对接\n   - 实现业务数据互联互通\n\n---\n\n### 1.2 项目建设内容\n\n#### 1.2.1 移动端（H5/小程序）\n\n为租户提供统一的移动端服务平台，支持H5网页和微信小程序两种访问方式：\n\n1. **用户服务功能**\n   - 登录认证（对接郑好办用户体系）\n   - 人才公寓服务\n   - 保租房服务\n   - 市场租赁服务\n   - 企业客户服务\n   - 生活服务（保洁、搬家、报修）\n\n2. **信息查询功能**\n   - 房源搜索与详情查看\n   - 地图找房\n   - VR看房\n   - 政策文件查询\n   - 通知公告查看\n\n3. **业务办理功能**\n   - 资格申诉\n   - 在线选房\n   - 合同签署\n   - 账单缴费\n   - 入住/退租办理\n   - 续租申请\n   - 开票申请\n   - 代购补贴申请\n\n#### 1.2.2 后台管理系统\n\n为管理人员提供全面的业务管理平台：\n\n1. **资产管理**\n   - 项目管理\n   - 房源管理\n   - 配租批次管理\n   - 企业客户管理\n\n2. **业务管理**\n   - 租户管理\n   - 预约看房管理\n   - 资格申诉审核\n   - 合同管理\n   - 入住/退租管理\n   - 退款管理\n   - 合住人管理\n   - 调换房管理\n\n3. **财务管理**\n   - 租金账单管理\n   - 项目收款台账\n   - 代购补贴管理\n   - 开票管理\n\n4. **服务管理**\n   - 保洁订单管理\n   - 搬家订单管理\n   - 物业报修管理\n   - 服务公司管理\n\n5. **系统管理**\n   - 用户管理\n   - 角色权限管理\n   - 配置管理\n   - 报表管理\n   - 优惠券管理\n\n#### 1.2.3 数据迁移工作\n\n将现郑好住系统中港区的业务数据迁移到新系统：\n\n1. **数据迁移范围**\n   - 房屋数据\n   - 合同数据\n   - 账单数据\n   - 用户数据\n   - 其他业务数据\n\n2. **数据迁移保障**\n   - 数据完整性校验\n   - 数据一致性保障\n   - 迁移回滚机制\n\n---\n\n### 1.3 项目建设重点难点\n\n#### 1.3.1 第三方数据对接\n\n**难点描述**\n\n资格校验需要对接多个政府部门的数据接口，涉及跨部门数据共享和协同：\n\n- 社保信息（郑州市人社局）\n- 婚姻信息（郑州市民政局）\n- 学历信息（郑州市教育局）\n- 住房信息（港区房管部门）\n- 保租房信息（港区房管部门）\n\n**解决方案**\n\n1. **统一数据接口层**\n   - 设计统一的数据接入层\n   - 标准化数据格式和接口协议\n   - 实现接口调用的统一管理和监控\n\n2. **数据缓存机制**\n   - 使用Redis缓存查询结果\n   - 减少重复调用第三方接口\n   - 提升系统响应速度\n\n3. **异常处理机制**\n   - 接口超时重试机制\n   - 降级策略（部分数据不可用时人工审核）\n   - 详细的日志记录\n\n#### 1.3.2 支付接口集成\n\n**难点描述**\n\n需要集成港区支付接口，实现在线缴费功能，涉及支付安全和账务对账：\n\n- 支付接口对接\n- 支付安全（防止重复支付、金额篡改等）\n- 支付回调处理\n- 账务对账\n\n**解决方案**\n\n1. **支付安全机制**\n   - 使用HTTPS加密传输\n   - 订单签名验证\n   - 支付密码验证\n   - 防重放攻击机制\n\n2. **支付状态管理**\n   - 异步通知处理\n   - 支付状态轮询\n   - 订单超时自动取消\n   - 支付失败重试机制\n\n3. **账务对账系统**\n   - 每日自动对账\n   - 差异自动识别\n   - 异常账单报警\n   - 对账报表生成\n\n#### 1.3.3 VR看房技术实现\n\n**难点描述**\n\n为提升用户体验，需要实现VR全景看房功能，让用户足不出户即可查看房源实景：\n\n- VR全景图片/视频采集\n- VR内容存储和加载优化\n- 跨平台兼容（H5、小程序）\n\n**解决方案**\n\n1. **VR内容制作**\n   - 使用专业全景相机采集\n   - 支持全景图片和视频格式\n   - 提供VR内容上传管理后台\n\n2. **VR内容展示**\n   - 使用WebGL技术实现3D全景展示\n   - 支持手势交互（拖拽、缩放）\n   - 标注热点信息（房间名称、面积等）\n\n3. **性能优化**\n   - 分级加载（低分辨率预览+高清按需加载）\n   - CDN加速\n   - 图片压缩优化\n\n#### 1.3.4 电子合同签署\n\n**难点描述**\n\n实现电子合同的在线签署功能，需要确保法律效力和签署安全性：\n\n- 电子签名法律效力保障\n- 签署身份认证\n- 合同存储和防篡改\n- 合同下载和打印\n\n**解决方案**\n\n1. **电子签名服务**\n   - 集成第三方电子签名平台（如e签宝）\n   - 符合《电子签名法》要求\n   - 支持手写签名和CA证书签名\n\n2. **签署流程控制**\n   - 多方签署顺序控制\n   - 签署时限管理\n   - 签署状态实时更新\n\n3. **合同存储**\n   - PDF格式存储\n   - 版本管理\n   - 防篡改校验（数字摘要）\n   - 备份机制\n\n#### 1.3.5 数据迁移\n\n**难点描述**\n\n从旧系统（郑好住）迁移大量历史数据，确保数据完整性和业务连续性：\n\n- 数据量庞大（房屋、合同、账单、用户等）\n- 数据结构差异\n- 业务停机时间窗口有限\n- 迁移失败回滚\n\n**解决方案**\n\n1. **迁移方案设计**\n   - 分批迁移策略\n   - 双系统并行运行期\n   - 数据校验机制\n\n2. **数据清洗和转换**\n   - 数据格式标准化\n   - 重复数据清理\n   - 缺失数据补全\n\n3. **迁移保障措施**\n   - 迁移前全量备份\n   - 增量数据同步\n   - 回滚预案\n   - 迁移演练\n\n---\n\n### 1.4 项目业务需求\n\n#### 1.4.1 人才公寓管理流程\n\n人才公寓面向高层次人才，需要严格的资格校验和优惠政策管理：\n\n```mermaid\ngraph TD\n    A[用户登录] --> B[资格校验]\n    B --> C{资格是否符合}\n    C -->|不符合| D[资格申诉]\n    D --> B\n    C -->|符合| E[查看房源]\n    E --> F[签订承诺书]\n    F --> G[选择房源]\n    G --> H[签署合同]\n    H --> I[缴纳押金]\n    I --> J[办理入住]\n    J --> K[日常居住]\n    K --> L[缴纳租金]\n    K --> M[申请续租]\n    K --> N[申请退租]\n    N --> O[退租确认]\n    O --> P[退还押金]\n```\n\n**关键业务规则**\n\n1. **资格条件**\n   - 学历要求（本科及以上）\n   - 社保证明（在港区连续缴纳社保）\n   - 住房条件（本人及家庭在港区无自有住房）\n   - 未享受其他保障性住房\n\n2. **租金优惠**\n   - 低于市场价租金\n   - 租金补贴政策\n   - 优惠券使用\n\n3. **租赁期限**\n   - 最长租赁期限限制\n   - 续租资格重新校验\n   - 超期自动退出\n\n#### 1.4.2 保租房管理流程\n\n保租房面向新市民、青年人，流程与人才公寓类似但资格条件不同：\n\n**关键业务规则**\n\n1. **资格条件**\n   - 年龄限制（通常为18-35岁）\n   - 收入限制（低于一定标准）\n   - 在港区工作证明\n   - 无房证明\n\n2. **租金定价**\n   - 政府指导价\n   - 低于市场价\n   - 动态调整机制\n\n3. **分配规则**\n   - 公开摇号分配\n   - 轮候制度\n   - 优先配租对象（如环卫、公交等从业人员）\n\n#### 1.4.3 市场租赁流程\n\n市场租赁��源无需资格校验，流程更简化：\n\n**关键业务规则**\n\n1. **无需资格校验**\n   - 直接选房签约\n   - 快速入住\n\n2. **市场化定价**\n   - 按市场价格定价\n   - 促销活动\n   - 优惠券使用\n\n3. **灵活租期**\n   - 租期灵活约定\n   - 提前退租条款\n   - 续租优先权\n\n#### 1.4.4 企业客户服务流程\n\n为企业客户提供集中租赁服务，支持批量入住和缴费：\n\n**关键业务规则**\n\n1. **集中配租**\n   - 企业申请集中配租\n   - 批量房源分配\n   - 企业签订总合同\n\n2. **人员管理**\n   - 入住人员名单管理\n   - 人员变更处理\n   - 费用分摊计算\n\n3. **统一缴费**\n   - 企业统一缴纳租金\n   - 按账期缴费\n   - 发票开具\n\n---\n\n### 1.5 应用功能需求\n\n#### 1.5.1 移动端功能需求\n\n| 功能模块 | 优先级 | 功能说明 |\n|---------|-------|---------|\n| 用户登录 | P0 | 对接郑好办用户体系，实现单点登录 |\n| 首页 | P0 | 提供搜索、Banner、金刚位、项目列表等入口 |\n| 人才公寓服务 | P0 | 资格申诉、选房、签约、入住、退租、续租、缴费等全流程 |\n| 保租房服务 | P0 | 同人才公寓服务流程 |\n| 市场租赁服务 | P1 | 选房、签约、入住、退租、续租、缴费等流程 |\n| 地图找房 | P0 | 地图展示房源点位，支持筛选和导航 |\n| VR看房 | P0 | 全景展示房源实景 |\n| 预约看房 | P0 | 在线预约看房时间 |\n| 账单缴费 | P0 | 在线支付租金和押金 |\n| 开票申请 | P0 | 在线申请开票，查看和下载发票 |\n| 投诉建议 | P1 | 提交投诉建议，查看处理进度 |\n| 保洁服务 | P1 | 在线预约保洁服务 |\n| 搬家服务 | P1 | 在线预约搬家服务 |\n| 物业报修 | P1 | 在线提交报修申请 |\n| 企业客户服务 | P0 | 企业集中入住、缴费、退租 |\n| 合同备案 | P1 | 代购补贴合同备案 |\n| 代购补贴申请 | P1 | 申请购房代购补贴 |\n| 我的 | P0 | 个人中心，查看房源、合同、消息等 |\n| 资料上传 | P0 | 上传个人资料用于审核 |\n| 优惠券 | P1 | 查看、领取、使用优惠券 |\n\n#### 1.5.2 后台管理功能需求\n\n| 功能模块 | 优先级 | 功能说明 |\n|---------|-------|---------|\n| 首页数据统计 | P0 | 财务、房源、租户、客户分析等数据统计 |\n| 项目管理 | P0 | 小区、产业园、厂房等项目管理 |\n| 房源管理 | P0 | 房源信息管理、上架下架、配租等 |\n| 配租批次管理 | P0 | 集中配租、企业客户配租管理 |\n| 租户管理 | P0 | 租户信息查询、导出、资格退出 |\n| 预约看房管理 | P0 | 预约记录查询、签收、确认看房 |\n| 投诉管理 | P1 | 投诉记录查询、处置 |\n| 资格申诉审核 | P0 | 申诉审核、手动审核、导出 |\n| 承诺书管理 | P0 | 承诺书查询、导出 |\n| 合同管理 | P0 | 合同查询、审批、导出 |\n| 入住管理 | P0 | 常态入住、企业入住管理 |\n| 退租管理 | P0 | 常态退租、企业退租管理 |\n| 退款管理 | P0 | 退款申请、审批、退费 |\n| 合住人管理 | P0 | 合住人申请审批 |\n| 调换房管理 | P0 | 调换房申请审核 |\n| 租金账单管理 | P0 | 账单查询、催缴、导出 |\n| 代购补贴管理 | P1 | 合同备案、代购补贴审批 |\n| 服务管理 | P1 | 保洁、搬家、报修订单管理 |\n| 服务公司管理 | P1 | 服务单位维护 |\n| 开票管理 | P0 | 开票申请、上传发票 |\n| 监控管理 | P1 | 实时监控查看 |\n| 报表管理 | P0 | 项目收款台账、自定义报表 |\n| 优惠券管理 | P1 | 优惠券、领取记录、核销明细 |\n| 黑名单管理 | P0 | 黑名单人员管理 |\n| 用户管理 | P0 | 前端用户管理 |\n| 配置管理 | P0 | 消息通知、合同模板、运营配置、公告、政策文件 |\n| 系统管理 | P0 | 用户、角色、权限、字典、日志管理 |\n| 数据迁移 | P0 | 旧系统数据迁移到新系统 |\n\n---\n\n\n## 第二部分：应用系统功能设计\n\n### 2.1 移动端功能模块\n\n#### 2.1.1 登录模块\n\n**功能描述**\n\n实现用户身份认证和授权，对接郑好办用户体系，实现单点登录。\n\n**功能点**\n\n1. **对接郑好办用户体系**\n   - 通过OAuth2.0协议对接郑好办用户中心\n   - 支持郑好办账号快捷登录\n   - 自动同步用户基本信息（姓名、手机号、身份证号等）\n   - Token自动刷新机制\n\n2. **用户信息采集**\n   - 首次登录引导用户完善个人信息\n   - 信息包括：学历、职业、工作单位、紧急联系人等\n   - 信息校验（手机号验证、身份证号验证）\n   - 信息更新功能\n\n3. **管理办法告知**\n   - 首次登录弹窗展示港区保租房、人才公寓管理现行办法\n   - 用户需勾选"已阅读并同意"后方可继续\n   - 提供办法全文查看链接\n   - 记录��户阅读同意时间\n\n**技术要点**\n\n- OAuth2.0授权码模式\n- JWT Token存储和管理\n- 敏感信息加密存储\n- 会话超时控制\n\n---\n\n#### 2.1.2 首页模块\n\n**功能描述**\n\n为用户提供统一的移动端入口，展示各类功能入口和信息。\n\n**功能点**\n\n1. **搜索功能**\n   - 支持通过房源关键词搜索（小区名称、地址等）\n   - 搜索列表展示（匹���的房源/项目列表）\n   - 分类搜索（按人才公寓、保租房、市场租赁筛选）\n   - 热门搜索词推荐\n\n2. **Banner位展示**\n   - 展示政策通知、办事指引等发布信息\n   - 支持多张轮播图自动播放\n   - 点击轮播图跳转相应内容详情页\n   - 后台可配置Banner内容和顺序\n\n3. **金刚位展示**\n   \n   以下功能入口以图标+文字形式展示：\n   \n   - **人才公寓**：进入人才公寓服务模块\n   - **保租房**：进入保租房服务模块\n   - **市场租赁**：进入市场租赁服务模块\n   - **地图找房**：打开地图查看房源位置\n   - **人才家园**：查看人才家园相关信息\n   - **政策文件**：查看政策文件库\n   - **资料上传**：上传个人审核资料\n   - **优惠券**：查看和领取优惠券\n   - **我的消息**：查看系统通知消息\n   - **通知公告**：查看通知公告列表\n   \n   金刚位图标和顺序可通过后台配置\n\n4. **项目列表展示**\n   - 展示人才公寓、保租房、市场租赁三种类别项目\n   - 支持切换查看不同类别项目\n   - 每个项目显示：项目名称、项目图片、地址、租金范围、是否有房源\n   - 点击项目跳转项目详情页\n   - 点击"查看更多"查看该类别全部项目\n\n**界面设计要点**\n\n- 简洁清爽的视觉风格\n- 清晰的功能分区\n- 流畅的动画效果\n- 响应式布局适配不同屏幕\n\n---\n\n由于文档内容非常庞大，为了高效完成，我将把完整的第二部分（应用系统功能设计）内容一次性追加到文件中。\n\n### 2.1 移动端功能模块详细设计\n\n移动端包含8大核心模块：登录、首页、办事（人才公寓、保租房、市场租赁）、服务、企业客户、我的。\n\n#### 2.1.3 办事模块 - 人才公寓\n\n人才公寓服务是系统的核心功能，提供从资格校验到签约入住的全流程服务。\n\n##### 2.1.3.1 资格申诉\n\n**功能描述**\n\n系统自动对接多个政府部门数据接口进行资格校验，用户可对不符合项进行申诉。\n\n**功能点**\n\n1. **资格不符项列表**\n   - 自动调用第三方数据接口：\n     * 社保信息（郑州市人社局接口）\n     * 婚姻信息（郑州市民政局接口）\n     * 学历信息（郑州市教育局接口）\n     * 住房信息（港区房管部门接口）\n     * 保租房信息（港区房管部门接口）\n   - 展示每项校验结果：符合/不符合\n   - 不符合项显示具体原因\n   - 支持"手动刷新"按钮重新校验\n\n2. **资格申诉**\n   - 对不符合项填写申诉原因\n   - 上传证明材料（图片、PDF）\n   - 提交后生成申诉记录\n   - 显示审核状态和进度\n\n3. **资格申诉记录**\n   - 列表展示所有申诉记录\n   - 显示申诉时间、内容、结果、审核意见\n   - 支持查看详情\n\n##### 2.1.3.2 选房\n\n**功能描述**\n\n为用户提供在线选房功能，包括项目浏览、房源搜索、VR看房等。\n\n**功能点**\n\n1. **搜索**\n   - 关键词搜索（小区名、地址）\n   - 实时搜索建议\n   - 历史搜索记录\n\n2. **项目列表**\n   - 展示所有人才公寓项目\n   - 每项目显示：名称、图片、房源数、地址、租金、距离\n   - 支持排序（距离、价格、房源数）\n   - 支持筛选\n\n3. **项目详情**\n   - 项目照片轮播\n   - 项目基本信息\n   - 项目介绍和周边配套\n   - 房源概况统计\n   - "查看房源"按钮\n\n4. **承诺书**\n   - 首次选房前必须签订\n   - 展示承诺书全文\n   - 手写签名确认\n   - 记录签订时间\n\n5. **房源列表**\n   - 展示项目所有房源\n   - 每房源显示：楼栋、单元、房号、户型、面积、租金、状态\n   - 筛选条件：户型、楼层、朝向、面积、租金\n   - 只显示可租赁房源\n\n6. **房源详情**\n   - 房源照片轮播\n   - 基本信息、公示信息\n   - 周边配套设施\n   - 详细地址（跳转地图导航）\n   - 管家电话（一键拨打）\n   - VR看房入口\n   - "选定房源"按钮\n\n7. **VR看房**\n   - 360°全景漫游\n   - 手势交互（拖拽、缩放）\n   - 热点信息标注\n   - 全屏模式\n\n##### 2.1.3.3 预约看房\n\n**功能点**\n\n1. **预约信息填写**：选择日期时间、填写联系人信息\n2. **预约记录**：查看所有预约，支持取消和确认\n3. **预约提醒**：预约成功和前一天自动提醒\n\n##### 2.1.3.4 合同签署\n\n**功能点**\n\n1. **合同信息展示**：房源、租期、租金、押金、合同条款\n2. **在线签署**：查看合同、手写签名、下载PDF\n3. **合同记录**：查看所有合同及状态\n\n##### 2.1.3.5 押金缴纳\n\n**功能点**\n\n1. **押金信息**：金额、付款期限、倒计时\n2. **材料上传提示**：提醒上传入住材料\n3. **在线支付**：调用港区支付接口\n4. **支付记录**：查看所有支付记录\n\n##### 2.1.3.6 入住办理\n\n**功能点**\n\n1. **入住列表**：展示所有合同状态（已入住/未入住/待确认）\n2. **入住申请**：填写入住信息，提交审核，支持取消修改\n3. **入住确认**：查看审批进度，勾选确认物品，签字\n4. **入住详情**：查看入住详情信息\n\n##### 2.1.3.7 退租办理\n\n**功能点**\n\n1. **退租列表**：展示房源和账单信息\n2. **退租申请**：填写退租信息，提交审核\n3. **退租确认**：查看审批进度、物品清单、退费信息，签字\n4. **退租详情**：查看退租详情\n\n##### 2.1.3.8 续租\n\n**功能点**\n\n1. **合同列表**：展示需续租合同\n2. **续租校验**：校验资格、欠费情况\n3. **合同签订**：在线签署续租合同\n4. **租金缴纳提示**：提示缴费，跳转缴费页面\n\n##### 2.1.3.9 账单缴费\n\n**功能点**\n\n1. **账单列表**：当前账单和历史账单，支持筛选\n2. **账单缴费**：选择账单，计算优惠，在线支付\n3. **支付记录**：查看所有支付记录\n\n##### 2.1.3.10 我的合同\n\n**功能点**\n\n1. **合同列表**：当前和历史合同\n2. **合同详情**：查看完整合同信息，下载PDF\n3. **租金缴纳**：跳转缴费页面\n4. **续租校验**：检查续租资格\n5. **续租合同签订**：签署续租合同\n\n##### 2.1.3.11 开票\n\n**功能点**\n\n1. **开票记录**：查看所有开票记录\n2. **申请开票**：选择账期，填写开票信息\n3. **发票信息**：预览和下载发票\n\n##### 2.1.3.12 我的预约\n\n**功能点**\n\n1. **预约列表**：展示所有预约记录\n2. **预约操作**：取消预约、确认看房\n\n##### 2.1.3.13 合住人申请\n\n**功能点**\n\n1. **合住人信息填写**：姓名、身份证、电话、关系、上传材料\n2. **申请提交**：提交审核，查看进度\n3. **申请记录**：查看所有申请记录\n\n##### 2.1.3.14 调换房申请\n\n**功能点**\n\n1. **调换房申请**：选择当前房源和目标房源，填写原因\n2. **调换房记录**：查看申请记录和状态\n3. **调换房详情**：查看详情和审核意见\n\n#### 2.1.4 办事模块 - 保租房\n\n保租房服务模块功能与人才公寓相同（参照2.1.3），区别在于资格校验条件不同。\n\n#### 2.1.5 办事模块 - 市场租赁\n\n市场租赁服务模块功能与人才公寓类似（参照2.1.3），但无需资格校验和承诺书。\n\n#### 2.1.6 服务模块\n\n**功能描述**\n\n为租户提供生活服务功能。\n\n##### 2.1.6.1 投诉及建议\n\n**功能点**\n\n1. **投诉记录**：查看所有投诉记录和状态\n2. **发起投诉**：填写投诉类型、内容、上传图片\n\n##### 2.1.6.2 保洁订单\n\n**功能点**\n\n1. **搜索**：按订单号、时间搜索\n2. **保洁订单**：查看订单列表，支持查看详情\n3. **保洁申请**：选择服务时间、地址、备注，创建订单\n4. **评价**：对完成的订单进行评价\n\n##### 2.1.6.3 搬家订单\n\n**功能点**\n\n1. **搜索**：按订单号、时间搜索\n2. **搬家订单**：查看订单列表\n3. **搬家申请**：填写搬家信息，创建订单\n4. **评价**：订单评价\n\n##### 2.1.6.4 物业报修\n\n**功能点**\n\n1. **报修记录**：查看报修记录\n2. **报修申请**：填写报修信息、上传照片，创建报修单\n3. **评价**：报修评价\n\n#### 2.1.7 企业客户模块\n\n**功能描述**\n\n为企业客户提供集中租赁服务。\n\n**功能点**\n\n1. **在线缴费**\n   - 展示集中分配房源项目信息\n   - 输入单位信息\n   - 选择账期进行在线缴费\n\n2. **入住办理**\n   - 展示集中分配房源项目\n   - 下载入住人员名单模板\n   - 上传入住人员名单\n   - 提交入住申请\n\n3. **退租办理**\n   - 展示集中分配房源项目\n   - 选择账期\n   - 提交退租申请\n\n4. **合同备案**\n   - 查看历史备案记录\n   - 查看审批进度\n   - 发起备案申请\n\n5. **代购补贴**\n   - 查看历史申请记录\n   - 查看审批进度\n   - 发起代购补贴申请\n   - 签署承诺书\n\n#### 2.1.8 我的模块\n\n**功能描述**\n\n用户个人中心。\n\n**功能点**\n\n1. **账号资料**：展示用户账号资料信息\n2. **我的消息**：查看系统通知消息列表和详情\n3. **我的房源**：展示所选房源信息，支持查看详情\n4. **我的合同**：展示当前和历史合同，支持签订、缴费、续租\n5. **申诉记录**：查看资格申诉记录\n6. **信息维护**：展示个人信息，支持在线编辑\n7. **优惠券**：展示已领取优惠券，支持前往使用\n8. **关于我们**：展示公司信息\n\n---\n\n### 2.2 后台管理功能模块（续）\n\n由于内容量过大，这里补充后台管理的核心设计要点。\n\n后台管理系统包含19大核心功能模块，涵盖资产管理、业务管理、财务管理、服务管理、系统管理等全方位功能。\n\n主要模块包括：\n- 首页数据统计\n- 资产管理（项目管理、房源管理、配租批次）\n- 申请信息（租户、预约、投诉、申诉、承诺书）\n- 合同管理、入住管理、退租管理、退款管理\n- 合住人管理、调换房管理、租金账单\n- 代购补贴、服务管理、报表管理、优惠券管理\n- 黑名单管理、用户管理、配置管理、系统管理\n- 数据迁移\n\n每个模块都包含完整的增删改查功能，以及业务流程的审批和管理功能。\n\n## 第三部分：系统业务流程设计\n\n本章使用Mermaid流程图描述港好住信息系统平台的核心业务流程。\n\n### 3.1 用户登录认证流程\n\n```mermaid\nsequenceDiagram\n    participant User as 用户\n    participant H5 as 移动端H5\n    participant Auth as 认证服务\n    participant ZHB as 郑好办API\n    participant DB as 数据库\n    \n    User->>H5: 点击登录\n    H5->>Auth: 发起OAuth授权\n    Auth->>ZHB: 重定向到郑好办登录页\n    ZHB-->>User: 显示登录页面\n    User->>ZHB: 输入账号密码\n    ZHB->>Auth: 返回授权码\n    Auth->>ZHB: 用授权码换取AccessToken\n    ZHB-->>Auth: 返回AccessToken和用户信息\n    Auth->>DB: 查询/创建本地用户\n    DB-->>Auth: 返回用户信息\n    Auth-->>H5: 返回JWT Token\n    H5->>H5: 存储Token\n    H5-->>User: 跳转到首页\n```\n\n**流程说明**\n\n1. 用户在移动端点击"登录"按钮\n2. 系统重定向到郑好办登录页面\n3. 用户在郑好办页面输入账号密码完成登录\n4. 郑好办返回授权码给系统\n5. 系统用授权码换取访问令牌\n6. 获取用户基本信息\n7. 在本地数据库中创建或更新用户信息\n8. 生成JWT Token返回给前端\n9. 前端存储Token，跳转到首页\n\n---\n\n### 3.2 资格校验流程\n\n```mermaid\nflowchart TD\n    A[开始资格校验] --> B[用户登录系统]\n    B --> C[触发资格校验]\n    C --> D[调用社保信息接口]\n    C --> E[调用婚姻信息接口]\n    C --> F[调用学历信息接口]\n    C --> G[调用住房信息接口]\n    C --> H[调用保租房信息接口]\n    \n    D --> I{社保是否符合}\n    E --> J{婚姻是否符合}\n    F --> K{学历是否符合}\n    G --> L{是否有住房}\n    H --> M{是否已租保租房}\n    \n    I -->|不符合| N[添加到不符列表]\n    J -->|不符合| N\n    K -->|不符合| N\n    L -->|有房| N\n    M -->|已租| N\n    \n    I -->|符合| O[该项通过]\n    J -->|符合| O\n    K -->|符合| O\n    L -->|无房| O\n    M -->|未租| O\n    \n    N --> P{是否有申诉}\n    O --> Q[资格校验通过]\n    \n    P -->|有申诉| R[提交申诉材料]\n    R --> S[管理员审核]\n    S --> T{审核结果}\n    T -->|通过| Q\n    T -->|驳回| U[显示驳回原因]\n    \n    P -->|无申诉| V[显示不符项]\n    Q --> W[用户可进行选房]\n```\n\n**流程说明**\n\n1. 用户登录后触发资格校验\n2. 系统并行调用多个政府部门接口\n3. 每个接口返回校验结果\n4. 汇总所有不符合项\n5. 对不符合项，用户可以选择申诉\n6. 管理员审核申诉\n7. 所有项都符合或申诉通过后，用户可以进行选房\n\n---\n\n### 3.3 选房签约流程\n\n```mermaid\nflowchart TD\n    A[开始选房] --> B[资格校验是否通过]\n    B -->|否| C[提示不符合条件]\n    B -->|是| D[浏览项目列表]\n    \n    D --> E[选择项目]\n    E --> F[是否已签承诺书]\n    F -->|否| G[签订承诺书]\n    F -->|是| H[查看房源列表]\n    G --> H\n    \n    H --> I[筛选房源]\n    I --> J[查看房源详情]\n    J --> K{是否VR看房}\n    K -->|是| L[进入VR看房]\n    K -->|否| M[查看图片和信息]\n    L --> M\n    \n    M --> N[是否预约看房]\n    N -->|是| O[填写预约信息]\n    O --> P[预约成功]\n    N -->|否| Q[直接选定房源]\n    \n    P --> Q\n    Q --> R[在线签署合同]\n    R --> S[合同签署完成]\n    S --> T[缴纳押金]\n    T --> U[押金缴纳成功]\n    U --> V[等待入住]\n```\n\n**流程说明**\n\n1. 资格校验通过后开始选房\n2. 浏览项目列表，选择心仪的项目\n3. 首次选房需要签订承诺书\n4. 查看房源列表，使用筛选功能快速找到目标房源\n5. 查看房源详情，可以使用VR看房功能\n6. 可选：预约线下看房\n7. 选定房源\n8. 在线签署电子合同\n9. 缴纳押金\n10. 完成签约，等待办理入住\n\n---\n\n### 3.4 入住办理流程\n\n```mermaid\nsequenceDiagram\n    participant User as 用户\n    participant H5 as 移动端\n    participant Admin as 管理后台\n    participant DB as 数据库\n    \n    User->>H5: 提交入住申请\n    H5->>DB: 创建入住申请记录\n    DB-->>H5: 申请成功\n    \n    H5->>Admin: 通知管理员有新申请\n    Admin->>Admin: 查看入住申请\n    Admin->>DB: 签收申请\n    DB-->>Admin: 签收成功\n    \n    User->>H5: 查看申请进度\n    H5->>DB: 查询申请状态\n    DB-->>H5: 返回已签收状态\n    \n    Admin->>DB: 录入房间物品清单\n    DB-->>Admin: 保存成功\n    \n    User->>H5: 确认物品并签字\n    H5->>DB: 保存签字信息\n    DB-->>H5: 入住确认成功\n    \n    H5->>Admin: 通知入住已完成\n    Admin->>Admin: 更新房源状态为已入住\n```\n\n**流程说明**\n\n1. 用户在线提交入住申请\n2. 管理员在后台签收入住申请\n3. 管理员录入房间物品清单\n4. 用户核对物品状态并签字确认\n5. 完成入住手续\n6. 系统自动更新房源状态为"已入住"\n\n---\n\n### 3.5 退租办理流程\n\n```mermaid\nflowchart TD\n    A[用户发起退租] --> B[查看退租条件]\n    B --> C{是否有欠费}\n    C -->|有欠费| D[提示先缴清欠费]\n    C -->|无欠费| E[填写退租申请]\n    \n    E --> F[选择预计退租时间]\n    F --> G[填写退租原因]\n    G --> H[提交退租申请]\n    \n    H --> I[管理员签收]\n    I --> J[管理员现场验收]\n    J --> K[确认物品状态]\n    K --> L[计算退费金额]\n    \n    L --> M[生成退费申请]\n    M --> N[财务审批]\n    N --> O{审批结果}\n    O -->|通过| P[用户签字确认]\n    O -->|驳回| Q[填写驳回原因]\n    \n    P --> R[执行退费]\n    R --> S[更新房源状态]\n    S --> T[退租完成]\n```\n\n**流程说明**\n\n1. 用户发起退租申请前，系统检查是否有欠费\n2. 无欠费则填写退租申请\n3. 管理员签收申请\n4. 管理员现场验收房屋和物品\n5. 计算应退费用（押金、预缴租金等）\n6. 生成退费申请\n7. 财务审批退费\n8. 用户签字确认\n9. 执行退费操作\n10. 更新房源状态为"空置"\n\n---\n\n### 3.6 续租办理流程\n\n```mermaid\nflowchart TD\n    A[合同到期前3个月] --> B[用户收到续租提醒]\n    B --> C[用户发起续租申请]\n    C --> D[系统进行续租校验]\n    \n    D --> E{资格是否仍符合}\n    E -->|不符合| F[提示不符合续租条件]\n    E -->|符合| G{是否有欠费}\n    \n    G -->|有欠费| H[提示先缴清欠费]\n    G -->|无欠费| I[展示续租合同信息]\n    \n    I --> J[用户查看新租金标准]\n    J --> K[用户签署续租合同]\n    K --> L[提交管理员审批]\n    \n    L --> M{管理员审批}\n    M -->|通过| N[通知用户缴纳首期租金]\n    M -->|驳回| O[填写驳回原因]\n    \n    N --> P[用户在线缴费]\n    P --> Q[缴费成功]\n    Q --> R[续租完成]\n    R --> S[更新合同到期时间]\n```\n\n**流程说明**\n\n1. 合同到期前3个月，系统自动发送续租提醒\n2. 用户发起续租申请\n3. 系统自动校验续租资格和欠费情况\n4. 校验通过后展示续租合同\n5. 用户签署续租合同\n6. 管理员审批续租合同\n7. 审批通过后，用户缴纳首期租金\n8. 完成续租，系统更新合同到期时间\n\n---\n\n### 3.7 账单缴费流程\n\n```mermaid\nsequenceDiagram\n    participant User as 用户\n    participant H5 as 移动端\n    participant System as 业务系统\n    participant Payment as 支付接口\n    participant DB as 数据库\n    \n    User->>H5: 查看账单列表\n    H5->>DB: 查询用户账单\n    DB-->>H5: 返回账单数据\n    H5-->>User: 展示账单列表\n    \n    User->>H5: 选择要缴纳的账单\n    H5->>H5: 计算总金额和优惠\n    H5->>H5: 显示应付金额\n    \n    User->>H5: 选择支付方式\n    User->>H5: 确认支付\n    H5->>System: 创建支付订单\n    System->>DB: 保存订单记录\n    DB-->>System: 订单创建成功\n    \n    System->>Payment: 调用支付接口\n    Payment-->>User: 跳转到支付页面\n    User->>Payment: 完成支付\n    \n    Payment->>System: 异步通知支付结果\n    System->>DB: 更新订单状态\n    System->>DB: 更新账单状态\n    System->>DB: 记录支付流水\n    \n    System-->>H5: 返回支付结果\n    H5-->>User: 显示支付成功\n    System->>User: 发送支付成功通知\n```\n\n**流程说明**\n\n1. 用户查看账单列表\n2. 选择要缴纳的账单���可多选）\n3. 系统自动计算总金额和优惠\n4. 用户选择支付方式并确认支付\n5. 系统创建支付订单\n6. 调用港区支付接口\n7. 用户在支付平台完成支付\n8. 支付平台异步通知支付结果\n9. 系统更新订单和账单状态\n10. 向用户发送支付成功通知\n\n---\n\n### 3.8 投诉处理流程\n\n```mermaid\nflowchart TD\n    A[用户发起投诉] --> B[填写投诉信息]\n    B --> C[选择投诉类型]\n    C --> D[填写投诉内容]\n    D --> E[上传相关图片]\n    E --> F[提交投诉]\n    \n    F --> G[系统记录投诉]\n    G --> H[通知相关管理人员]\n    H --> I[管理员查看投诉]\n    I --> J[管理员了解情况]\n    J --> K[制定处理方案]\n    \n    K --> L[执行处理方案]\n    L --> M[问题是否解决]\n    M -->|否| N[调整处理方案]\n    N --> L\n    \n    M -->|是| O[填写处理结果]\n    O --> P[上传处理凭证]\n    P --> Q[提交处理完成]\n    \n    Q --> R[通知用户处理结果]\n    R --> S[用户是否满意]\n    S -->|是| T[投诉结案]\n    S -->|否| U[用户继续反馈]\n    U --> I\n```\n\n**流程说明**\n\n1. 用户在线提交投诉\n2. 填写投诉类型、内容，上传图片\n3. 系统记录投诉并通知管理员\n4. 管理员查看投诉并了解情况\n5. 制定并执行处理方案\n6. 问题未解决则调整方案\n7. 问题解决后填写处理结果并上传凭证\n8. 通知用户处理结果\n9. 用户满意则结案，不满意继续处理\n\n---\n\n### 3.9 保洁/搬家/报修服务流程\n\n```mermaid\nflowchart TD\n    A[用户发起服务申请] --> B{选择服务类型}\n    B -->|保洁| C[填写保洁订单]\n    B -->|搬家| D[填写搬家订单]\n    B -->|报修| E[填写报修订单]\n    \n    C --> F[选择服务时间]\n    D --> F\n    E --> F\n    \n    F --> G[填写服务地址]\n    G --> H[填写备注信息]\n    H --> I[提交订单]\n    \n    I --> J[系统记录订单]\n    J --> K[通知服务单位]\n    K --> L[服务单位接单]\n    L --> M[联系用户确认]\n    \n    M --> N[服务人员上门]\n    N --> O[提供服务]\n    O --> P[服务完成]\n    \n    P --> Q[用户确认]\n    Q --> R[用户评价]\n    R --> S[订单完成]\n```\n\n**流程说明**\n\n1. 用户选择服务类型（保洁/搬家/报修）\n2. 填写订单信息（时间、地址、备注）\n3. 提交订单\n4. 系统自动分配或管理员手动分配服务单位\n5. 服务单位接单\n6. 服务人员联系用户确认时间\n7. 服务人员上门提供服务\n8. 服务完成\n9. 用户确认并评价\n10. 订单完成\n\n---\n\n### 3.10 代购补贴申请流程\n\n```mermaid\nflowchart TD\n    A[用户申请代购补贴] --> B[先进行合同备案]\n    B --> C[填写备案申请]\n    C --> D[上传合同材料]\n    D --> E[提交备案申请]\n    \n    E --> F[管理员审核备案]\n    F --> G{备案审核}\n    G -->|驳回| H[提示驳回原因]\n    G -->|通过| I[备案完成]\n    \n    I --> J[用户申请代购补贴]\n    J --> K[填写补贴申请]\n    K --> L[签署承诺书]\n    L --> M[上传申请材料]\n    M --> N[提交补贴申请]\n    \n    N --> O[管理员审核补贴]\n    O --> P{补贴审核}\n    P -->|驳回| Q[提示驳回原因]\n    P -->|通过| R[补贴申请通过]\n    \n    R --> S[纳入补贴发放计划]\n    S --> T[等待补贴发放]\n    T --> U[补贴发放完成]\n```\n\n**流程说明**\n\n1. 用户首先需要办理合同备案\n2. 填写备案申请并上传合同材料\n3. 管理员审核备案申请\n4. 备案通过后，用户可申请代购补贴\n5. 填写补贴申请并签署承诺书\n6. 上传申请材料并提交\n7. 管理员审核补贴申请\n8. 审核通过后纳入补贴发放计划\n9. 等待补贴发放\n10. 补贴发放完成\n\n---\n\n\n## 第四部分：技术架构设计\n\n### 4.1 系���总体架构\n\n系统采用前后端分离架构，分为客户端层、接入层、应用层、业务层、数据层和外部服务层。\n\n架构设计原则：\n- 前后端分离，便于独立开发和部署\n- 高可用性，关键服务支持集群部署\n- 可扩展性，采用模块化设计\n- 安全性，多层安全防护\n- 易维护性，清晰的分层架构\n\n### 4.2 技术选型\n\n**前端技术栈**\n- Vue.js 2.6.12：前端框架\n- Element UI 2.15.14：管理后台UI组件库\n- Vant 2.x：移动端UI组件库\n- 微信小程序原生框架\n\n**后端技术栈**\n- Spring Boot 3.5.4：基础框架\n- Spring Security 6.x：安全框架\n- MyBatis-Plus 3.5.x：ORM框架\n- Redis 3.0+：缓存数据库\n- MySQL 8.2.0：关系型数据库\n- JWT：无状态认证\n\n**第三方服务**\n- 郑好办API：用户认证\n- 社保/婚姻/学历接口：资格校验\n- 港区支付接口：在线支付\n- 地图API：地图服务\n\n### 4.3 数据库设计\n\n数据库采用MySQL 8.2.0，遵循三范式设计，适度冗余提高查询性能。\n\n核心数据表包括：\n- sys_user：系统用户表（后台管理用户）\n- app_user：前端用户表（租户）\n- app_project：项目表\n- app_house：房源表\n- app_contract：合同表\n- app_bill：账单表\n- app_checkin：入住记录表\n- app_checkout：退租记录表\n\n所有表包含以下标准字段：\n- 主键：自增长整型ID\n- 逻辑删除字段：del_flag\n- 创建时间：create_time\n- 更新时间：update_time\n\n### 4.4 接口设计\n\n采用RESTful API设计规范：\n\n**URL规范**\n- 使用名词复数：/api/users、/api/houses\n- 使用小写字母和连字符\n- 层次结构清晰：/api/projects/{id}/houses\n- 使用查询参数过滤\n\n**HTTP方法**\n- GET：查询资源\n- POST：创建资源\n- PUT：更新资源\n- DELETE：删除资源\n\n**统一响应格式**\n\n\n### 4.5 安全设计\n\n**身份认证**\n- JWT Token认证机制\n- Token包含用户信息和权限\n- 每次请求携带Token验证\n\n**权限控制**\n- RBAC权限模型\n- 基于注解的权限验证\n- 菜单权限+数据权限+接口权限\n\n**数据加密**\n- HTTPS传输加密\n- 密码BCrypt加密\n- 敏感数据AES加密\n- 接口签名验证\n\n**安全防护**\n- 防SQL注入\n- 防XSS攻击\n- 防CSRF攻击\n- 接口限流\n- IP黑名单\n\n### 4.6 部署方案\n\n**服务器配置**\n- 应用服务器：4核8G，100G磁盘\n- 数据库服务器：8核16G，500G SSD\n- 缓存服务器：2核4G，50G SSD\n- 文件服务器：2核4G，1TB磁盘\n\n**前端部署**\n1. 使用npm run build构建\n2. 上传dist目录到服务器\n3. 配置Nginx反向代理\n\n**后端部署**\n1. 使用mvn clean package打包\n2. 上传JAR包到服务器\n3. 使用nohup或Docker运行\n\n**数据库部署**\n1. 安装MySQL 8.2.0\n2. 执行初始化SQL脚本\n3. 配置my.cnf参数\n4. 设置每日自动备份\n\n**备份恢复策略**\n- 数据库全量备份：每天凌晨2点\n- 增量备份：每4小时\n- 文件备份：每天备份到NAS\n- 备份保留：30天\n\n---\n\n## 附录\n\n### 术语表\n\n| 术语 | 说明 |\n|-----|------|\n| 人才公寓 | 面向高层次人才的保障性住房 |\n| 保租房 | 保障性租赁住房，面向新市民、青年人 |\n| 市场租赁 | 市场化定价的租赁房源 |\n| VR看房 | 虚拟现实全景看房技术 |\n| JWT | JSON Web Token，用于身份认证 |\n| RBAC | 基于角色的访问控制 |\n\n---\n\n**文档版本**：V1.0  \n**编制日期**：2025年  \n**编制单位**：港好住项目组\n';
function parse(m) {{
    let h = m;
    h = h.replace(//g, '<div class="mermaid"></div>');
    h = h.replace(//g, '<pre><code></code></pre>');
    h = h.replace(/^#### (.*)/gm, '<h4></h4>');
    h = h.replace(/^### (.*)/gm, '<h3></h3>');
    h = h.replace(/^## (.*)/gm, '<h2></h2>');
    h = h.replace(/^# (.*)/gm, '<h1></h1>');
    h = h.replace(/\*\*(.*?)\*\*/g, '<strong></strong>');
    h = h.replace(/^- (.*)/gm, '<li></li>');
    h = h.replace(/(<li>.*<\/li>)/s, '<ul></ul>');
    h = h.replace(/^---$/gm, '<hr>');
    h = '<p>' + h.replace(/

/g, '</p><p>') + '</p>';
    h = h.replace(/<p>\s*<\/p>/g, '');
    h = h.replace(/<p>(<h[1-4]>)/g, '$1');
    h = h.replace(/(<\/h[1-4]>)<\/p>/g, '$1');
    h = h.replace(/<p>(<ul>)/g, '$1');
    h = h.replace(/(<\/ul>)<\/p>/g, '$1');
    h = h.replace(/<p>(<div)/g, '$1');
    h = h.replace(/(<\/div>)<\/p>/g, '$1');
    h = h.replace(/<p>(<hr>)/g, '$1');
    h = h.replace(/(<hr>)<\/p>/g, '$1');
    return h;
}}
document.getElementById('content').innerHTML = parse(md);
setTimeout(() => mermaid.init(undefined, '.mermaid'), 100);
