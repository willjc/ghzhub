# 项目相关配置
ruoyi:
  # 名称
  name: RuoYi
  # 版本
  version: 3.9.0
  # 版权年份
  copyrightYear: 2025
  # 文件路径 示例（ Windows配置D:/ruoyi/uploadPath，Linux配置 /home/ruoyi/uploadPath）
  # profile: D:/ruoyi/uploadPath
  profile: /www/wwwroot/ghzupload
  # profile: /Users/wangwen/Desktop/ghz/ghz/uploadfile
  
  # 获取ip地址开关
  addressEnabled: false
  # 验证码类型 math 数字计算 char 字符验证
  captchaType: math

# 开发环境配置
server:
  # 服务器的HTTP端口，默认为8080
  port: 8090
  servlet:
    # 应用的访问路径
    context-path: /
  tomcat:
    # tomcat的URI编码
    uri-encoding: UTF-8
    # 连接数满后的排队数，默认为100
    accept-count: 1000
    threads:
      # tomcat最大线程数，默认为200
      max: 800
      # Tomcat启动初始化的线程数，默认值10
      min-spare: 100

# 日志配置
logging:
  level:
    com.ruoyi: debug
    org.springframework: warn

# 用户配置
user:
  password:
    # 密码最大错误次数
    maxRetryCount: 5
    # 密码锁定时间（默认10分钟）
    lockTime: 10

# Spring配置
spring:
  # 资源信息
  messages:
    # 国际化资源文件路径
    basename: i18n/messages
  profiles:
    active: druid
  # 文件上传
  servlet:
    multipart:
      # 单个文件大小
      max-file-size: 10MB
      # 设置总上传的文件大小
      max-request-size: 20MB
  # 服务模块
  devtools:
    restart:
      # 热部署开关
      enabled: true
  data:
    # redis 配置
    redis:
      # 地址
      host: localhost
      # 端口，默认为6379
      port: 6379
      # 数据库索引
      database: 0
      # 密码
      password:
      # 连接超时时间
      timeout: 10s
      lettuce:
        pool:
          # 连接池中的最小空闲连接
          min-idle: 0
          # 连接池中的最大空闲连接
          max-idle: 8
          # 连接池的最大数据库连接数
          max-active: 8
          # #连接池最大阻塞等待时间（使用负值表示没有限制）
          max-wait: -1ms

# token配置
token:
  # 令牌自定义标识
  header: Authorization
  # 令牌密钥
  secret: abcdefghijklmnopqrstuvwxyz
  # 令牌有效期（默认30分钟）
  expireTime: 30

# MyBatis-Plus配置
mybatis-plus:
  # 搜索指定包别名
  type-aliases-package: com.ruoyi.**.domain
  # 配置mapper的扫描，找到所有的mapper.xml映射文件
  mapper-locations: classpath*:mapper/**/*Mapper.xml
  # 配置MyBatis-Plus全局配置
  global-config:
    # 数据库配置
    db-config:
      # 主键类型 AUTO:"数据库ID自增" INPUT:"用户输入ID" ID_WORKER:"全局唯一ID (数字类型唯一ID)" UUID:"全局唯一ID UUID"
      id-type: AUTO
      # 逻辑删除配置
      logic-delete-field: delFlag
      logic-delete-value: 2
      logic-not-delete-value: 0
    # 是否控制台打印Logo
    banner: false
  # MyBatis原生配置
  configuration:
    # 驼峰下划线转换
    map-underscore-to-camel-case: true
    # 缓存配置
    cache-enabled: false
    # 延迟加载
    lazy-loading-enabled: true
    # 多结果集
    multiple-result-sets-enabled: true
    # 日志实现类
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

# Springdoc配置
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    tags-sorter: alpha
  group-configs:
    - group: 'default'
      display-name: '测试模块'
      paths-to-match: '/**'
      packages-to-scan: com.ruoyi.web.controller.tool

# 防盗链配置
referer:
  # 防盗链开关
  enabled: false
  # 允许的域名列表
  allowed-domains: localhost,127.0.0.1,ruoyi.vip,www.ruoyi.vip

# 防止XSS攻击
xss:
  # 过滤开关
  enabled: true
  # 排除链接（多个用逗号分隔）
  excludes: /system/notice
  # 匹配链接
  urlPatterns: /system/*,/monitor/*,/tool/*

# 郑好办对接配置
zhenghaoban:
  # 网关配置
  gateway:
    url: https://zhenghaoban.zzsxzspj.zhengzhou.gov.cn:10019/open/api/do
    app-id: ${ZHB_APP_ID:48c84098-de3f-4cc4-838b-76b22682d741}
    iv-str: ${ZHB_IV_STR:n3A4N3/YA6P3SyhigYRWLw==}
    key-str: ${ZHB_KEY_STR:gA+s5Zma5pO0mUP+1nUPXQ==}
    secret-key: ${ZHB_SECRET_KEY:3874c82e}
  # 应用配置
  app:
    module-id: ${ZHB_MODULE_ID:413780}

# 微信支付配置
# 开发/测试环境不配置证书时设 enabled: false，生产环境填好证书后改为 true
wechat:
  pay:
    enabled: false
    appid: "wx_your_appid"
    mch-id: "your_mch_id"
    api-v3-key: "your_api_v3_key_32chars"
    private-key-path: "classpath:certs/apiclient_key.pem"
    cert-serial-no: "your_cert_serial_no"
    notify-domain: "https://your-domain.com"
    h5-notify-url: "${wechat.pay.notify-domain}/h5/pay/wechat/notify"

